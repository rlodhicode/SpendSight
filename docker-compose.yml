services:
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8681 --project=spendsight-local
    ports:
      - "8681:8681"

  fake-gcs:
    image: fsouza/fake-gcs-server:1.52.2
    command: -scheme http -port 4443 -external-url http://localhost:4443
    ports:
      - "4443:4443"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: spendsight
      POSTGRES_PASSWORD: spendsight
      POSTGRES_DB: spendsight
    ports:
      - "5434:5432"
    volumes:
      - spendsight_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendsight -d spendsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://spendsight:spendsight@postgres:5432/spendsight
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: docker-dev-secret
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:5173, http://localhost:5174
      QUEUE_NAME: bill-jobs
      QUEUE_PROVIDER: pubsub
      PUBSUB_TOPIC: bill-jobs
      PUBSUB_PROJECT_ID: spendsight-local
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8681
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gcp-creds.json
    volumes:
      - spendsight_uploads:/data/uploads
      - ./secrets:/app/secrets:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./apps/worker
    environment:
      DATABASE_URL: postgresql://spendsight:spendsight@postgres:5432/spendsight
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: bill-jobs
      QUEUE_PROVIDER: pubsub
      PUBSUB_PROJECT_ID: spendsight-local
      PUBSUB_SUBSCRIPTION: bill-jobs-sub
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8681
      UPLOAD_DIR: /data/uploads
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gcp-creds.json
    volumes:
      - spendsight_uploads:/data/uploads
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  spendsight_postgres:
  spendsight_uploads:
