services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: spendsight
      POSTGRES_PASSWORD: spendsight
      POSTGRES_DB: spendsight
    ports:
      - "5434:5432"
    volumes:
      - spendsight_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: postgresql://spendsight:spendsight@postgres:5432/spendsight
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: docker-dev-secret
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:5173
      QUEUE_NAME: bill-jobs
    volumes:
      - spendsight_uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../apps/worker
    environment:
      DATABASE_URL: postgresql://spendsight:spendsight@postgres:5432/spendsight
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: bill-jobs
      UPLOAD_DIR: /data/uploads
    volumes:
      - spendsight_uploads:/data/uploads
    depends_on:
      - postgres
      - redis
      - api

  web:
    build:
      context: ../apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  spendsight_postgres:
  spendsight_uploads:
